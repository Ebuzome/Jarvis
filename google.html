<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - Google Accounts</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Roboto',sans-serif;
    background:#0f0f0f;
    color:#e3e3e3;
    min-height:100vh;
}

.page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:32px;
}

.card{
    background:#1f1f1f;
    width:100%;
    max-width:1040px;
    border-radius:28px;
    padding:48px;
    display:flex;
    gap:96px;
    min-height:400px;
}

.left{
    flex:1;
    padding-top:8px;
}

.right{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding-top:8px;
}

.google-logo{
    width:48px;
    height:48px;
    margin-bottom:24px;
}

h1{
    font-size:36px;
    font-weight:400;
    line-height:1.2;
    margin-bottom:12px;
}

.subtitle{
    font-size:16px;
}

.input-wrapper{
    position:relative;
    width:100%;
    margin-bottom:8px;
}

.input-wrapper input{
    width:100%;
    background:transparent;
    border:1px solid #747775;
    border-radius:4px;
    color:#e3e3e3;
    font-size:16px;
    padding:18px 16px;
    outline:none;
}

.input-wrapper input:focus{
    border:2px solid #a8c7fa;
}

.input-wrapper label{
    position:absolute;
    left:12px;
    top:18px;
    background:#1f1f1f;
    padding:0 4px;
    color:#8e918f;
    font-size:16px;
    transition:all .15s ease;
    pointer-events:none;
}

.input-wrapper input:focus + label,
.input-wrapper input:not(:placeholder-shown) + label{
    transform:translateY(-22px) scale(.75);
    transform-origin:left center;
}

.input-wrapper input:focus + label{
    color:#a8c7fa;
}

.link-btn{
    background:none;
    border:none;
    color:#a8c7fa;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
}

.link-btn:hover{
    text-decoration:underline;
}

.info{
    margin-top:48px;
    color:#c4c7c5;
    font-size:14px;
    line-height:22px;
}

.actions{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:16px;
    margin-top:48px;
}

.create-account{
    background:transparent;
    border:none;
    color:#a8c7fa;
    font-size:14px;
    font-weight:500;
    padding:10px 16px;
    border-radius:999px;
    cursor:pointer;
}

.create-account:hover{
    background:rgba(168,199,250,0.1);
}

.next-btn{
    background:#a8c7fa;
    color:#041e49;
    border:none;
    border-radius:999px;
    padding:10px 24px;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
}

.next-btn:hover{
    background:#b5d0fc;
}

@media (max-width: 768px){
    .card{
        flex-direction:column;
        gap:48px;
        padding:32px;
    }

    .actions{
        margin-top:32px;
    }
}
</style>
</head>
<body>

<div class="page">

    <div class="card">

        <!-- Left Side -->
        <div class="left">

            <svg viewBox="0 0 24 24" class="google-logo" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>

            <h1>Sign in</h1>
            <p class="subtitle">Use your Google Account</p>

        </div>

        <!-- Right Side -->
        <div class="right">

            <div>

                <div class="input-wrapper">
                    <input type="text" id="email" placeholder=" ">
                    <label for="email">Email or phone</label>
                </div>

                <button class="link-btn">
                    Forgot email?
                </button>

                <div class="info">
                    Not your computer? Use Guest mode to sign in privately.<br>

                    <button class="link-btn" style="margin-top:4px;">
                        Learn more about using Guest mode
                    </button>
                </div>

            </div>

            <div class="actions">

                <button class="create-account">
                    Create account
                </button>

                <button class="next-btn">
                    Next
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
