<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign in - Google Accounts</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Google Sans', 'Roboto', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* desktop two-column layout */
    .desktop-container {
      display: flex;
      flex-direction: row;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      border-radius: 28px;
      overflow: hidden;
    }

    /* LEFT SIDE – branding, logo & illustration */
    .left-panel {
      flex: 1;
      background: #fff;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .left-panel .logo-large svg {
      width: 96px;
      height: auto;
      margin-bottom: 32px;
    }
    .left-panel h2 {
      font-size: 32px;
      font-weight: 500;
      color: #1f1f1f;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    .left-panel p {
      font-size: 16px;
      color: #5f6368;
      line-height: 1.5;
      max-width: 280px;
    }
    .left-panel .illustration {
      margin-top: 48px;
      width: 100%;
      max-width: 300px;
    }
    .left-panel .illustration svg {
      width: 100%;
      opacity: 0.85;
    }

    /* RIGHT SIDE – sign-in card (exact form) */
    .right-panel {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 40px;
      background: #fff;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: transparent;
    }
    /* right card contents */
    .card h1 {
      font-size: 28px;
      font-weight: 400;
      line-height: 1.2;
      color: #1f1f1f;
      margin-bottom: 8px;
      text-align: left;
    }
    .subhead {
      font-size: 16px;
      color: #1f1f1f;
      margin-bottom: 32px;
      text-align: left;
    }

    /* floating label input */
    .field {
      margin-bottom: 24px;
      position: relative;
      width: 100%;
    }
    .field input {
      width: 100%;
      padding: 16px 16px 8px 16px;
      font-size: 16px;
      font-family: inherit;
      border: 1px solid #dadce0;
      border-radius: 4px;
      outline: none;
      background: transparent;
      transition: all 0.2s;
      color: #1f1f1f;
    }
    .field input:focus {
      border-color: #0b57d0;
      border-width: 2px;
      padding-bottom: 7px;
      padding-top: 15px;
    }
    .field label {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #5f6368;
      pointer-events: none;
      background: #fff;
      padding: 0 4px;
      transition: 0.1s ease-out;
      font-weight: 400;
    }
    .field input:focus ~ label,
    .field input:not(:placeholder-shown) ~ label {
      top: 0;
      transform: translateY(-50%);
      font-size: 12px;
      color: #0b57d0;
    }
    .field input::placeholder {
      opacity: 0;
    }

    .forgot-link {
      margin-bottom: 32px;
    }
    .forgot-link button {
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      color: #0b57d0;
      cursor: pointer;
      padding: 4px 0;
    }
    .forgot-link button:hover {
      background: rgba(11, 87, 208, 0.04);
      border-radius: 12px;
      text-decoration: underline;
    }

    .guest-text {
      font-size: 14px;
      color: #5f6368;
      line-height: 1.4286;
      margin-top: 32px;
    }
    .guest-text a {
      color: #0b57d0;
      text-decoration: none;
      font-weight: 500;
    }
    .guest-text a:hover {
      text-decoration: underline;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 24px;
    }
    .create-btn {
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: #0b57d0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .create-btn:hover {
      background: rgba(11, 87, 208, 0.04);
    }
    .create-btn svg {
      width: 18px;
      height: 18px;
      fill: #0b57d0;
    }
    .next-btn {
      background: #0b57d0;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      min-width: 88px;
    }
    .next-btn:hover {
      background: #0b4bc2;
      box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
    }

    .footer {
      margin-top: 56px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #ecedef;
      padding-top: 24px;
      font-size: 12px;
    }
    .lang-btn {
      background: transparent;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: inherit;
      color: #1f1f1f;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
    }
    .lang-btn:hover {
      background: rgba(0,0,0,0.04);
    }
    .lang-btn svg {
      width: 16px;
      height: 16px;
      fill: #5f6368;
    }
    .footer-links {
      display: flex;
      gap: 28px;
    }
    .footer-links a {
      color: #5f6368;
      text-decoration: none;
    }
    .footer-links a:hover {
      text-decoration: underline;
    }

    /* focus outlines */
    button:focus-visible, input:focus-visible, a:focus-visible {
      outline: 2px solid #0b57d0;
      outline-offset: 2px;
      border-radius: 2px;
    }

    /* responsive: stack on mobile */
    @media (max-width: 860px) {
      .desktop-container {
        flex-direction: column;
        border-radius: 0;
        box-shadow: none;
        max-width: 100%;
      }
      .left-panel {
        padding: 32px 24px;
      }
      .left-panel .logo-large svg {
        width: 64px;
      }
      .left-panel h2 {
        font-size: 24px;
      }
      .right-panel {
        padding: 24px 20px 32px;
      }
      .card {
        max-width: 100%;
      }
      .actions {
        flex-direction: column-reverse;
        align-items: stretch;
      }
      .next-btn {
        width: 100%;
        text-align: center;
      }
      .create-btn {
        justify-content: center;
      }
      .footer {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
    }

    /* desktop minimal adjustments */
    @media (min-width: 861px) {
      .left-panel {
        border-right: 1px solid #ecedef;
      }
    }
  </style>
</head>
<body>
<div class="desktop-container">
  <!-- LEFT COLUMN: Large Google G Logo + info -->
  <div class="left-panel">
    <div class="logo-large">
      <!-- exact Google G logo provided by user (4‑color icon) -->
      <svg xmlns="https://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 40 48" aria-hidden="true">
        <path fill="#4285F4" d="M39.2 24.45c0-1.55-.16-3.04-.43-4.45H20v8h10.73c-.45 2.53-1.86 4.68-4 6.11v5.05h6.5c3.78-3.48 5.97-8.62 5.97-14.71z"></path>
        <path fill="#34A853" d="M20 44c5.4 0 9.92-1.79 13.24-4.84l-6.5-5.05C24.95 35.3 22.67 36 20 36c-5.19 0-9.59-3.51-11.15-8.23h-6.7v5.2C5.43 39.51 12.18 44 20 44z"></path>
        <path fill="#FABB05" d="M8.85 27.77c-.4-1.19-.62-2.46-.62-3.77s.22-2.58.62-3.77v-5.2h-6.7C.78 17.73 0 20.77 0 24s.78 6.27 2.14 8.97l6.71-5.2z"></path>
        <path fill="#E94235" d="M20 12c2.93 0 5.55 1.01 7.62 2.98l5.76-5.76C29.92 5.98 25.39 4 20 4 12.18 4 5.43 8.49 2.14 15.03l6.7 5.2C10.41 15.51 14.81 12 20 12z"></path>
      </svg>
    </div>
    <h2>Sign in</h2>
    <p>Continue to your Google Account</p>
    <div class="illustration" aria-hidden="true">
      <svg viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M60 40 L140 40 L160 80 L140 100 L60 100 L40 80 L60 40Z" fill="#F1F3F4" stroke="#DADCE0" stroke-width="1.5"/>
        <circle cx="100" cy="70" r="12" fill="#4285F4" fill-opacity="0.2" stroke="#4285F4" stroke-width="1"/>
        <rect x="85" y="65" width="30" height="4" rx="2" fill="#4285F4"/>
        <rect x="90" y="55" width="20" height="2" rx="1" fill="#34A853"/>
        <rect x="90" y="80" width="20" height="2" rx="1" fill="#EA4335"/>
      </svg>
    </div>
  </div>

  <!-- RIGHT COLUMN: sign‑in form -->
  <div class="right-panel">
    <div class="card">
      <h1>Sign in</h1>
      <div class="subhead">Use your Google Account</div>

      <!-- email field -->
      <div class="field">
        <input type="email" id="email" placeholder=" " autocomplete="username">
        <label for="email">Email or phone</label>
      </div>

      <!-- forgot email -->
      <div class="forgot-link">
        <button type="button" id="forgotBtn">Forgot email?</button>
      </div>

      <!-- guest mode info -->
      <div class="guest-text">
        Not your computer? Use Guest mode to sign in privately.
        <a href="#" id="guestLink">Learn more about using Guest mode</a>
      </div>

      <!-- actions row -->
      <div class="actions">
        <button class="create-btn" id="createBtn">
          Create account
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M7 10l5 5 5-5z"/>
          </svg>
        </button>
        <button class="next-btn" id="nextBtn">Next</button>
      </div>

      <!-- footer: language + links -->
      <div class="footer">
        <button class="lang-btn" id="langBtn">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
            <path d="M12 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 9c-2.7 0-5.8 1.29-6 2v1h12v-1c-.2-.71-3.3-2-6-2z"/>
          </svg>
          English (United States)
        </button>
        <div class="footer-links">
          <a href="#">Help</a>
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Minimal demo alerts – only to simulate click feedback, no real auth -->
<script>
  (function() {
    const next = document.getElementById('nextBtn');
    const forgot = document.getElementById('forgotBtn');
    const create = document.getElementById('createBtn');
    const lang = document.getElementById('langBtn');
    const guest = document.getElementById('guestLink');

    if (next) next.addEventListener('click', (e) => { e.preventDefault(); alert("Demo: sign-in would proceed (static preview)."); });
    if (forgot) forgot.addEventListener('click', (e) => { e.preventDefault(); alert("Demo: 'Forgot email?' flow (static)."); });
    if (create) create.addEventListener('click', (e) => { e.preventDefault(); alert("Demo: 'Create account' options (static)."); });
    if (lang) lang.addEventListener('click', (e) => { e.preventDefault(); alert("Demo: language selector (static)."); });
    if (guest) guest.addEventListener('click', (e) => { e.preventDefault(); alert("Demo: Learn more about Guest mode."); });
  })();
</script>
</body>
</html>
